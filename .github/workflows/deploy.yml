name: Deploy Automático Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Baixando o código
        uses: actions/checkout@v4

      - name: Instalando Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalando dependências
        run: npm install

      - name: Gerando versão final (Build)
        run: npm run build

      - name: Verificando Segredos (Diagnóstico)
        run: |
          if [ -z "${{ secrets.FTP_SERVER }}" ]; then echo "ERRO: FTP_SERVER não encontrado!"; exit 1; else echo "OK: FTP_SERVER configurado."; fi

      - name: Enviando para Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./public_html/
          dangerous-clean-slate: true
